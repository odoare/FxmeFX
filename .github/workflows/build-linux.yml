name: Build Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Linux x86_64

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig1-dev libgl1-mesa-dev

      - name: Checkout FxmeFX
        uses: actions/checkout@v4
        with:
          path: FxmeFX
          submodules: recursive

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure
        run: cmake -B FxmeFX/build -S FxmeFX -DCMAKE_BUILD_TYPE=Release

      - name: Build (one plugin at a time)
        # Build each plugin sequentially. Building all six together pulls in
        # the full JUCE module set per plugin (six independent translation
        # units) plus an LTO link each, which can OOM-kill the runner; doing
        # them one-at-a-time keeps peak memory bounded by a single plugin's
        # build.
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab; do
            echo "::group::Build Fxme${plugin}"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_All" --parallel 2
            echo "::endgroup::"
          done

      - name: Upload VST3 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: FxmeFX-VST3-Linux-x86_64
          path: FxmeFX/build/Source/*/Fxme*_artefacts/Release/VST3/
