name: Build macOS Universal

# Manual-only: run on demand from the Actions tab. Automatic builds on every
# commit are intentionally disabled — release artefacts are produced by
# release.yml on vx.y.z tags.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Apple Silicon — Clang cross-compiles x86_64 too

    steps:
      - name: Checkout FxmeFX
        uses: actions/checkout@v4
        with:
          path: FxmeFX
          submodules: recursive

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          # Pin to a specific JUCE release for reproducible builds.
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure CMake
        run: cmake -B FxmeFX/build -S FxmeFX -DCMAKE_BUILD_TYPE=Release

      - name: Build (one plugin at a time)
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab Oct; do
            echo "::group::Build Fxme${plugin}"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_All" --parallel 2
            echo "::endgroup::"
          done

      - name: Build Pure Data externals
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab Oct; do
            echo "::group::Build Fxme${plugin} (Pd)"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_pd" --parallel 2
            echo "::endgroup::"
          done

      - name: Verify a universal binary
        run: |
          lipo -info "FxmeFX/build/Source/Compressor/FxmeCompressor_artefacts/Release/VST3/FxmeCompressor.vst3/Contents/MacOS/FxmeCompressor"

      - name: Upload VST3 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: FxmeFX-VST3-macOS-universal
          path: FxmeFX/build/Source/*/Fxme*_artefacts/Release/VST3/

      - name: Upload AU artefacts
        uses: actions/upload-artifact@v4
        with:
          name: FxmeFX-AU-macOS-universal
          path: FxmeFX/build/Source/*/Fxme*_artefacts/Release/AU/

      - name: Upload Pd externals
        uses: actions/upload-artifact@v4
        with:
          name: FxmeFX-Pd-macOS-universal
          path: FxmeFX/build/Source/*/*.pd_darwin
