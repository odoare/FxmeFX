name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────────────────
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig1-dev libgl1-mesa-dev

      - uses: actions/checkout@v4
        with:
          path: FxmeFX
          submodules: recursive

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure
        run: cmake -B FxmeFX/build -S FxmeFX -DCMAKE_BUILD_TYPE=Release

      - name: Build (one plugin at a time)
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab Oct; do
            echo "::group::Build Fxme${plugin}"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_All" --parallel 2
            echo "::endgroup::"
          done

      - name: Build Pure Data externals
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab Oct; do
            echo "::group::Build Fxme${plugin} (Pd)"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_pd" --parallel 2
            echo "::endgroup::"
          done

      - name: Package
        shell: bash
        run: |
          mkdir -p stage/VST3 stage/Pd
          cp -r FxmeFX/build/Source/*/Fxme*_artefacts/Release/VST3/*.vst3 stage/VST3/
          # Pd externals (fxme*~.pd_linux) — flat list, no per-plugin subdir.
          if compgen -G "FxmeFX/build/Source/*/*.pd_linux" > /dev/null; then
            cp FxmeFX/build/Source/*/*.pd_linux stage/Pd/
          fi
          cd stage
          zip -r "${{ github.workspace }}/FxmeFX-VST3-Linux-x86_64.zip" VST3/
          if [ -d Pd ] && [ -n "$(ls -A Pd)" ]; then
            zip -r "${{ github.workspace }}/FxmeFX-Pd-Linux-x86_64.zip" Pd/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-vst3
          path: FxmeFX-VST3-Linux-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-pd
          path: FxmeFX-Pd-Linux-x86_64.zip
          if-no-files-found: ignore


  # ── Windows x86_64 ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: FxmeFX
          submodules: recursive

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure
        run: cmake -B FxmeFX/build -S FxmeFX -G "Visual Studio 17 2022"

      - name: Build (one plugin at a time)
        shell: pwsh
        run: |
          foreach ($plugin in 'Compressor','Equalizer','Tube','Transient','StereoDelay','ConvolReverb','Cab','Oct') {
            Write-Host "::group::Build Fxme$plugin"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_All" --parallel 2
            if ($LASTEXITCODE -ne 0) { throw "Build of Fxme$plugin failed" }
            Write-Host "::endgroup::"
          }

      - name: Build Pure Data externals
        shell: pwsh
        run: |
          foreach ($plugin in 'Compressor','Equalizer','Tube','Transient','StereoDelay','ConvolReverb','Cab','Oct') {
            Write-Host "::group::Build Fxme$plugin (Pd)"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_pd" --parallel 2
            if ($LASTEXITCODE -ne 0) { throw "Build of Fxme${plugin}_pd failed" }
            Write-Host "::endgroup::"
          }

      - name: Package
        shell: bash
        run: |
          mkdir -p stage/VST3 stage/Pd
          # JUCE places .vst3 bundles as directories on Windows under VST3/
          cp -r FxmeFX/build/Source/*/Fxme*_artefacts/Release/VST3/*.vst3 stage/VST3/
          # Pd externals build as plain .dll under <plugin>/Release/.
          if compgen -G "FxmeFX/build/Source/*/Release/fxme*.dll" > /dev/null; then
            cp FxmeFX/build/Source/*/Release/fxme*.dll stage/Pd/
          fi
          cd stage
          7z a "${{ github.workspace }}/FxmeFX-VST3-Windows-x86_64.zip" VST3
          if [ -d Pd ] && [ -n "$(ls -A Pd)" ]; then
            7z a "${{ github.workspace }}/FxmeFX-Pd-Windows-x86_64.zip" Pd
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-vst3
          path: FxmeFX-VST3-Windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-pd
          path: FxmeFX-Pd-Windows-x86_64.zip
          if-no-files-found: ignore

  # ── macOS universal (arm64 + x86_64) ──────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          path: FxmeFX
          submodules: recursive

      - uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      - name: Configure
        run: cmake -B FxmeFX/build -S FxmeFX -DCMAKE_BUILD_TYPE=Release

      - name: Build (one plugin at a time)
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab Oct; do
            echo "::group::Build Fxme${plugin}"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_All" --parallel 2
            echo "::endgroup::"
          done

      - name: Build Pure Data externals
        run: |
          for plugin in Compressor Equalizer Tube Transient StereoDelay ConvolReverb Cab Oct; do
            echo "::group::Build Fxme${plugin} (Pd)"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_pd" --parallel 2
            echo "::endgroup::"
          done

      - name: Verify a universal binary
        run: |
          lipo -info "FxmeFX/build/Source/Compressor/FxmeCompressor_artefacts/Release/VST3/FxmeCompressor.vst3/Contents/MacOS/FxmeCompressor"

      - name: Package raw zips
        shell: bash
        run: |
          mkdir -p stage/VST3 stage/AU stage/Pd
          cp -r FxmeFX/build/Source/*/Fxme*_artefacts/Release/VST3/*.vst3 stage/VST3/
          cp -r FxmeFX/build/Source/*/Fxme*_artefacts/Release/AU/*.component stage/AU/
          if compgen -G "FxmeFX/build/Source/*/*.pd_darwin" > /dev/null; then
            cp FxmeFX/build/Source/*/*.pd_darwin stage/Pd/
          fi
          cd stage
          zip -r "${{ github.workspace }}/FxmeFX-VST3-macOS-universal.zip" VST3/
          zip -r "${{ github.workspace }}/FxmeFX-AU-macOS-universal.zip"  AU/
          if [ -d Pd ] && [ -n "$(ls -A Pd)" ]; then
            zip -r "${{ github.workspace }}/FxmeFX-Pd-macOS-universal.zip" Pd/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-vst3
          path: FxmeFX-VST3-macOS-universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-au
          path: FxmeFX-AU-macOS-universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-pd
          path: FxmeFX-Pd-macOS-universal.zip
          if-no-files-found: ignore

  # ── Publish GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-linux-x86_64, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
          generate_release_notes: true
