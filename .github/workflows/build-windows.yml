name: Build Windows

# Manual-only: run on demand from the Actions tab. Automatic builds on every
# commit are intentionally disabled — release artefacts are produced by
# release.yml on vx.y.z tags.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout FxmeFX
        uses: actions/checkout@v4
        with:
          path: FxmeFX
          submodules: recursive

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Checkout FxmeJuceTools
        uses: actions/checkout@v4
        with:
          repository: odoare/FxmeJuceTools
          path: _fxme_tmp

      - name: Install FxmeJuceTools module
        shell: bash
        run: |
          mkdir -p JUCE/usermodules
          mv _fxme_tmp/module/FxmeJuceTools JUCE/usermodules/FxmeJuceTools

      # Pd-vanilla's bin/pd.lib is the import library MSVC needs to resolve
      # the m_pd.h ABI (pd_new, outlet_new, dsp_add, ...). Without it, the Pd
      # external link step fails with __imp_* unresolved externals. The
      # official Pd source builds are hosted on msp.ucsd.edu (the URL
      # advertised by puredata.info/downloads).
      - name: Fetch Pd-vanilla (for pd.lib)
        shell: pwsh
        run: |
          $pdVersion = "0.56-2"
          $pdZip = "pd-$pdVersion.msw.zip"
          $url = "https://msp.ucsd.edu/Software/$pdZip"
          Write-Host "Fetching $url"
          Invoke-WebRequest -Uri $url -OutFile $pdZip
          Expand-Archive -Path $pdZip -DestinationPath pd-msw
          $pdLib = (Get-ChildItem -Path pd-msw -Recurse -Filter pd.lib | Select-Object -First 1).FullName
          if (-not $pdLib) { throw "pd.lib not found inside $pdZip" }
          Write-Host "FXME_PD_LIB=$pdLib"
          echo "FXME_PD_LIB=$pdLib" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake -B FxmeFX/build -S FxmeFX -G "Visual Studio 17 2022" "-DFXME_PD_LIB=$env:FXME_PD_LIB"
        shell: pwsh

      - name: Build (one plugin at a time)
        run: |
          foreach ($plugin in 'Compressor','Equalizer','Tube','Transient','StereoDelay','ConvolReverb','Cab','Oct') {
            Write-Host "::group::Build Fxme$plugin"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_All" --parallel 2
            if ($LASTEXITCODE -ne 0) { throw "Build of Fxme$plugin failed" }
            Write-Host "::endgroup::"
          }
        shell: pwsh

      - name: Build Pure Data externals
        run: |
          foreach ($plugin in 'Compressor','Equalizer','Tube','Transient','StereoDelay','ConvolReverb','Cab','Oct') {
            Write-Host "::group::Build Fxme$plugin (Pd)"
            cmake --build FxmeFX/build --config Release --target "Fxme${plugin}_pd" --parallel 2
            if ($LASTEXITCODE -ne 0) { throw "Build of Fxme${plugin}_pd failed" }
            Write-Host "::endgroup::"
          }
        shell: pwsh

      - name: Upload VST3 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: FxmeFX-VST3-Windows-x86_64
          path: FxmeFX/build/Source/*/Fxme*_artefacts/Release/VST3/

      - name: Upload Pd externals
        uses: actions/upload-artifact@v4
        with:
          name: FxmeFX-Pd-Windows-x86_64
          path: FxmeFX/build/Source/*/Release/*.dll
